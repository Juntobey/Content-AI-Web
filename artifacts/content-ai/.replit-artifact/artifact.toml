kind = "web"
previewPath = "/"
title = "ContentAI"
version = "1.0.0"
id = "artifacts/content-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24325

[services.development]
run = "pnpm --filter @workspace/content-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/content-ai", "run", "build" ]
publicDir = "artifacts/content-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24325"
BASE_PATH = "/"
